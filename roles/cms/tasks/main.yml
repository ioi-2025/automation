- name: Install CMS base prerequisite packages
  become: yes
  package:
    name: "{{ item }}"
    state: present
  with_items:
    - git
    - postgresql-client
    - libpq-dev
    - python3.12
    - python3.12-dev
    - python3.12-venv
    - libyaml-dev
    - zip
    - libffi-dev
    - build-essential # Required to build some CMS Python dependencies
    - libcups2-dev # Required by pycups CMS Python dependency
    - pkg-config
    - libsystemd-dev
  tags: packages
  notify: Restart CMS

- name: Install CMS contest web service prerequisite packages
  become: yes
  package:
    name: "{{ item }}"
    state: present
  with_items:
    - cppreference-doc-en-html
  tags: packages
  when: '"cms_contest_web" in services'
  notify: Restart CMS

- name: Install CMS worker service prerequisite packages
  become: yes
  package:
    name: "{{ item }}"
    state: present
  with_items:
    - cgroup-lite
    - libcap-dev
    - g++-9
    - python3.12
    - python3.12-dev
  tags: packages
  when: '"cms_worker" in services'
  notify: Restart CMS

- name: Create CMS group
  become: yes
  group:
    name: cmsuser
    system: yes
  notify: Restart CMS

- name: Create CMS user
  become: yes
  user:
    name: cmsuser
    group: cmsuser
    comment: CMS default user
    create_home: yes
    shell: /bin/bash
    system: yes
  notify: Restart CMS

- name: Add cmsuser to sudo group
  become: yes
  user:
    name: cmsuser
    groups: sudo
    append: yes

- name: Disable sudo password
  become: yes
  lineinfile:
    path: /etc/sudoers
    line: '%sudo ALL=(ALL) NOPASSWD:ALL'
    validate: 'visudo -cf %s'

- name: Reset SSH connection to allow user changes to affect current Ansible user
  meta: reset_connection

- name: Ensure CMS parent directories exist
  become: yes
  file:
    path: "{{ item }}"
    owner: root
    group: root
    mode: '0755'
    follow: no
    state: directory
  with_items:
    - /var/local/log
    - /var/local/cache
    - /var/local/lib
    - /var/local/run
    - /usr/local/include
    - /usr/local/share

- name: Ensure CMS directories exist
  become: yes
  file:
    path: "{{ item }}"
    owner: cmsuser
    group: cmsuser
    mode: '0770'
    follow: yes
    state: directory
  with_items:
    - /var/local/cache/cms
    - /var/local/run/cms
    - /usr/local/include/cms
    - /usr/local/share/cms

- name: Ensure CMS and CMS ranking parent directories exist
  become: yes
  file:
    path: "{{ item }}"
    owner: cmsuser
    group: cmsuser
    mode: '0775'
    follow: yes
    state: directory
  with_items:
    - /var/local/log/cms
    - /var/local/lib/cms

- name: Ensure CMS ranking directory exists
  become: yes
  file:
    path: "{{ item }}"
    owner: cmsuser
    group: cmsuser
    mode: '0755'
    follow: yes
    state: directory
  with_items:
    - /var/local/lib/cms/ranking
    - /var/local/log/cms/ranking
  when: '"cms_ranking" in services'

- name: Check out the CMS repository
  become: yes
  become_user: cmsuser
  git:
    repo: "{{ cms_repo }}"
    version: "{{ cms_version }}"
    dest: /home/cmsuser/src/
    accept_hostkey: yes
    depth: 1
  register: cms_git_checkout_result

- name: Ensure /home/cmsuser/src exists and is owned by cmsuser
  become: yes
  file:
    path: /home/cmsuser/src
    state: directory
    recurse: yes
    owner: cmsuser
    group: cmsuser
    mode: '0755'

- name: Run install.py
  become: yes
  become_user: cmsuser
  args:
    chdir: /home/cmsuser/src/
  shell: python3 install.py --dir=/home/cmsuser/cms cms
  register: prereq_result

- name: Show install.py output (stdout)
  ansible.builtin.debug:
    var: prereq_result.stdout_lines

- name: Show install.py errors (stderr)
  ansible.builtin.debug:
    var: prereq_result.stderr_lines

- name: Add virtualenv activation to cmsuser profile
  become: yes
  become_user: cmsuser
  lineinfile:
    path: /home/cmsuser/.profile
    line: 'source /home/cmsuser/cms/bin/activate'
    create: yes
    state: present

- name: Install CMS Python constraints.txt
  become: yes
  pip:
    requirements: /home/cmsuser/src/constraints.txt
    virtualenv:  /home/cmsuser/cms
    virtualenv_command: python3.12 -m venv
  when: cms_git_checkout_result.after is defined
  notify: Restart CMS

- name: Write latest Git commit hash to cms_installed_git_commit
  become: yes
  template:
    src: cms_installed_git_commit.j2
    dest: /home/cmsuser/cms_installed_git_commit
    owner: cmsuser
    mode: '0664'
  when: cms_git_checkout_result.after is defined

- name: Copy Polygon testlib.h
  become: yes
  copy:
    src: /home/cmsuser/src/cmscontrib/loaders/polygon/testlib.h
    dest: /usr/local/include/cms/testlib.h
    remote_src: yes
    follow: yes
    owner: root
    group: root

- name: Copy CMS configuration files
  include_tasks: copy_config.yml
  tags: always

- name: Migrate CMS DB if needed
  include_tasks: migrate_db.yml
  when: run_db_migration | bool
  tags: always

- name: Create and enable CMS systemd services
  include_tasks: setup_services.yml
  tags: always

- name: Flush CMS restart handlers
  meta: flush_handlers
  tags: always

